<!DOCTYPE html>
<html>
<head>
    <title>Create Resume</title>

<style>

/* BODY */
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(to right, #667eea, #764ba2);
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    background: #ffffff;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* HEADINGS */
h1 {
    text-align: center;
    margin-bottom: 20px;
}

h3 {
    margin-top: 20px;
    margin-bottom: 8px;
    color: #333;
}

/* GRID FIXED */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
}

/* FORCE VERTICAL STACK (IMPORTANT FIX) */
.form-grid > div {
    display: flex;
    flex-direction: column;
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #f9fafb;
    font-size: 14px;
    display: block;
}

/* TEXTAREA */
textarea {
    min-height: 100px;
    resize: vertical;
}

/* FOCUS EFFECT */
input:focus, textarea:focus, select:focus {
    border-color: #667eea;
    background: #ffffff;
    outline: none;
    box-shadow: 0 0 5px rgba(102,126,234,0.3);
}

/* CENTER SECTION */
.center-section {
    text-align: center;
    margin-top: 30px;
}

/* SELECT CENTER */
.center-section select {
    width: 300px;
}

/* BUTTON */
button {
    padding: 12px;
    width: 300px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

/* BUTTON HOVER */
button:hover {
    background: #4f5bd5;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    .form-grid {
        grid-template-columns: 1fr;
    }

    button, .center-section select {
        width: 100%;
    }
}

</style>
</head>

<body>

<div class="container">
    <h1>Create Your Resume</h1>

    <form action="/generate_resume" method="POST">

    <input type="hidden" name="template" value="{{ template }}">

    <div class="form-grid">

        <!-- LEFT -->
        <div>

            <h3>Personal Details</h3>
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="phone" placeholder="Phone" required>
            <input type="text" name="address" placeholder="Address" required>

            <h3>Education</h3>
            <input type="text" name="degree" placeholder="Degree" required>
            <input type="text" name="college" placeholder="College" required>
            <input type="text" name="year" placeholder="Year" required>

            <h3>Skills</h3>
            <input type="text" name="skills" placeholder="Skills">

            <h3>Projects</h3>
            <textarea name="projects" placeholder="Projects"></textarea>

        </div>

        <!-- RIGHT -->
        <div>

            <h3>Experience</h3>
            <textarea name="experience" placeholder="Experience"></textarea>

            <h3>Certifications</h3>
            <textarea name="certifications" placeholder="Certifications"></textarea>

            <h3>Achievements</h3>
            <textarea name="achievements" placeholder="Achievements"></textarea>

            <h3>LinkedIn</h3>
            <input type="text" name="linkedin" placeholder="LinkedIn Profile">

        </div>

    </div>

    <!-- BOTTOM CENTER -->
    <div class="center-section">

        <h3>Theme Color</h3>

        <select name="theme_color">
            <option value="#667eea">Blue</option>
            <option value="#28a745">Green</option>
            <option value="#dc3545">Red</option>
            <option value="#000000">Black</option>
        </select>

        <br><br>

        <button type="submit">Generate Resume</button>

    </div>

    </form>
</div>

</body>
</html>
