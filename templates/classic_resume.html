<!DOCTYPE html>
<html>
<head>
    <title>Classic Resume</title>
    <style>
    @page {
        size: A4;
        margin: 0;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: "Times New Roman", serif;
        background: white;
        color: #000;
    }

    .resume-container {
        width: 100%%;
        min-height: 297mm;
        padding: 0;
        box-sizing: border-box;
    }

    h1 {
        font-size: 30px;
        margin-bottom: 8px;
    }

    .contact {
        font-size: 16px;
        margin-bottom: 20px;
    }

    .section {
        margin-top: 22px;
    }

    .section h2 {
        font-size: 25px;
        border-bottom: 2px solid black;
        margin-bottom: 10px;
        padding-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    p {
        font-size: 20px;
        margin: 6px 0;
        line-height: 1.7;
    }
</style>
</head>

<body>

<div class="resume-container">

    <h1>{{name}}</h1>
    <div class="contact">
        {{email}} | {{phone}}<br>
        {{address}}
    </div>

    <div class="section">
        <h2>Career Objective</h2>
        <p>{{ai_summary}}</p>
    </div>

    <div class="section">
        <h2>Education</h2>
        <p><b>{{degree}}</b></p>
        <p>{{college}} - {{year}}</p>
    </div>

    <div class="section">
        <h2>Skills</h2>
        <p>{{skills}}</p>
    </div>

    <div class="section">
        <h2>Projects</h2>
        <p>{{projects}}</p>
    </div>

    <div class="section">
        <h2>Experience</h2>
        <p>{{experience}}</p>
    </div>

</div>

</body>
</html>
