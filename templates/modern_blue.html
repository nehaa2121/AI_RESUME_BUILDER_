<!DOCTYPE html>
<html>
<head>
    <title>Modern Blue Resume</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding:0;
        }
        table{
            width:100%;
            border-collapse: collapse;
            
        }
        .left {
            width: 30%;
            background: #1e3a8a;
            color: white;
            padding: 25px;
            vertical-align:top;
        }

        h1 {
            margin: 0;
            color:#1e3a8a;
            font-size:30px;
        }
        h2 {
            border-bottom:2px solid #2563eb;
            padding-bottom:5px;
            font-size:25px;
        }
        .left h2{
            border-bottom:2px solid #3b82f6;
            font-size:25px;
        }

        p {
            font-size: 20px;
        }

        /* RIGHT SIDE */
        .right {
            width: 70%;
            padding: 2px;
            vertical-align:top;
        }

        ul {
            padding-left: 18px;
        }

        li {
            margin-bottom: 5px;
        }
        *{
            -webkit-print-color-adjust:exact;
        }
    </style>
</head>

<body>
<table>
    <tr>
    <!-- LEFT -->
    <td class="left">
        <h2>Contact</h2>
        <p><b>Email:</b> {{ email }}</p>
        <p><b>Phone:</b> {{ phone }}</p>
        <p><b>Address:</b> {{ address }}</p>

        <h2>Skills</h2>
        <p>{{ skills }}</p>

        <h2>Education</h2>
        <p><b>{{ degree }}</b></p>
        <p>{{ college }}</p>
        <p>{{ year }}</p>
    </td>

    <!--RIGHT PANEL-->
    <td class="right">
        <h1>{{ name }}</h1>

        <div class="section">
            <h2>Career Objective</h2>
            <p>{{ ai_summary }}</p>
        </div>

        <div class="section">
            <h2>Projects</h2>
            <p>{{ projects }}</p>
        </div>

        <div class="section">
            <h2>Experience</h2>
            <p>{{ experience }}</p>
        </div>
</td>
</tr>
</table>
<br><br>

</body>
</html>
