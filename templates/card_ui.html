<!DOCTYPE html>
<html>
<head>
    <title>Card Resume</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 20px;
        }

        /* CENTER CARD */
        .card {
            width: 800px;
            margin: auto;
            background: white;
            border: 1px solid #ddd; /* use border instead of shadow */
            padding: 25px;
        }

        h1 {
            margin-bottom: 5px;
            color: #111;
            font-size:30
        }

        h2 {
            margin-top: 20px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            font-size: 25px;
        }

        p {
            font-size: 20px;
            margin: 5px 0;
        }

        .top {
            margin-bottom: 15px;
        }

        /* IMPORTANT FOR PDF */
        * {
            -webkit-print-color-adjust: exact;
        }

        @page {
            size: A4;
            margin: 10mm;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- HEADER -->
    <div class="top">
        <h1 style="color: {{ theme_color }};">{{ name }}</h1>
        <p>{{ email }} | {{ phone }}</p>
        <p>{{ address }}</p>
    </div>

    <!-- CAREER -->
    <h2 style="color: {{ theme_color }};">Career Objective</h2>
    <p>{{ ai_summary }}</p>

    <!-- EDUCATION -->
    <h2 style="color: {{ theme_color }};">Education</h2>
    <p><b>{{ degree }}</b></p>
    <p>{{ college }} - {{ year }}</p>

    <!-- SKILLS -->
    <h2 style="color: {{ theme_color }};">Skills</h2>
    <p>{{ skills }}</p>

    <!-- PROJECTS -->
    <h2 style="color: {{ theme_color }};">Projects</h2>
    <p>{{ projects }}</p>

    <!-- EXPERIENCE -->
    <h2 style="color: {{ theme_color }};">Experience</h2>
    <p>{{ experience }}</p>

</div>

</body>
</html>
