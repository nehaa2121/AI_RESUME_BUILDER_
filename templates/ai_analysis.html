<!DOCTYPE html>
<html>
<head>
    <title>AI Analysis</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #111827;
        }

        h3 {
            margin-top: 25px;
            color: #1f2937;
        }

        p {
            background: #f9fafb;
            padding: 10px;
            border-radius: 6px;
        }

        ul {
            background: #f9fafb;
            padding: 15px;
            border-radius: 6px;
        }

        li {
            margin-bottom: 8px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            margin-top: 20px;
        }

        .back {
            background: #2563eb;
        }

        .download {
            background: #10b981;
        }

        .center {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>AI Resume Analysis 🚀</h2>


    <!-- AI Improved Resume -->
    <h3>Improved Resume Content</h3>
    <p>{{ ai_output }}</p>

    <!-- AI Skills -->
    <h3>Recommended Skills</h3>
    <p>{{ ai_skills }}</p>

    

    <!-- Extra Suggestions -->
    <h3>Quick Suggestions</h3>
    <ul>
        {% for tip in suggestions %}
            <li>{{ tip }}</li>
        {% endfor %}
    </ul>

    <!-- Buttons -->
    <div class="center">
        <a href="/download" class="btn download">Download PDF</a>
        <a href="/dashboard" class="btn back">Back to Dashboard</a>
    </div>

</div>

</body>
</html>
