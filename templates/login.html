<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <style>
            body{
                margin:0;
                font-family:'Segoe UI';
                background:linear-gradient(to right, #667eea, #764ba2);
                display:flex;
                justify-content:center;
                align-items: center;
                height:100vh;
            }
            .box{
                background:white;
                padding:30px;
                border-radius:10px;
                width:300px;
                text-align:center;
                box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            }
            h2{
                margin-bottom:20px;
            }
            input{
                width:100%;
                padding:10px;
                margin:10px 0;
                border:1px solid #ccc;
                border-radius:5px; 
            }
            button {
                width:100%;
                padding:10px;
                background: #667eea;
                color:white;
                border: none;
                border-radius:5px;
                cursor:pointer;
            }
            button:hover{
                background:#5a67d8;
            }
            a{
                text-decoration:none;
                color:#667eea;
            }
            input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px; 
        /* Fixes width overflow issues */
        box-sizing: border-box; 
    }
    
    label {
        display: block;
        text-align: left;
        font-size: 0.9rem;
        color: #555;
        font-weight: bold;
    }

        </style>
    </head>
    <body>
        <div class="box">
        <h2>Login</h2>
        <form action="/login" method="post">
            <label>Email</label><br>
            <input type="email" name="email" placeholder="Enter your email" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
            
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="/signup">Signup</a></p>
        </div>
        
    </body>
    </html>
